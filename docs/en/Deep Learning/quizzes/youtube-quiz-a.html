      userid: this.userid, grade: totalPct,

      return encodeURIComponent(k) + '=' + encodeURIComponent(payload[k]);
    }).join('&');

      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: params
    }).then(function(r) { return r.json(); })

};
