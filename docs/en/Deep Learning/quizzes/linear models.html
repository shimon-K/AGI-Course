   ]
  },
  {
    maxTries: 2,
    label: 'Regression objective',
    questions: [
      {
        type: 'cloze', x: 4, y: 15, w: 92,
        parts: [
          'Linear regression finds the best-fit line by minimizing the sum of ',
          { blank: true, ans: 'squared', w: 87, type: 'select', options: ['squared', 'absolute', 'the'] },
          ' errors (also called OLS: Ordinary ',
          { blank: true, ans: 'Least', w: 87, type: 'select', options: ['Most', 'Least', 'Loss', 'Lowest'] },

          { blank: true, ans: 'closed', w: 87, type: 'select', options: ['open', 'closed', 'general', 'math'] },

      text: '✓ Linear regression minimizes the Sum of SQUARED Errors (SSE). The method is called Ordinary LEAST Squares (OLS). Unlike logistic regression which requires iterative optimization, linear regression has a direct CLOSED-form solution: β = (XᵀX)⁻¹Xᵀy.',

        ans: -4, tol: 0, unit: ''
      }

    bubbles: [ {
      text: '✓ Calculation: β₁ = Σ(xᵢ−x̄)(yᵢ−ȳ) / Σ(xᵢ−x̄)² = [(−1)(−1) + (0)(0) + (1)(1)] / [(−1)² + 0² + 1²] = 2/2 = 1. Then β₀ = ȳ − β₁·x̄ = 3 − 1·2 = 1. So ŷ = 1·x + 1. This matches the presentation example on slide 45.',

      x: 4, y: 30, w: 92

    {
      text: '✓ ŷ = -3·(5) + 11 = -4. Simple substitution into the fitted regression equation. This is prediction/inference — using the trained model on new input.',

      x: 4, y: 70, w: 92
    }
   ]

        ans: [0, 1, 3]
      }

      text: '✓ Correct: A hyperplane in 2D is a line, in 3D is a plane, and the equation is wᵀx + b = 0. The normal vector w is PERPENDICULAR (not parallel) to the hyperplane. A hyperplane passes through the origin only when b = 0.',

      x: 4, y: 40, w: 92
    }
  },
  {
    maxTries: 3,
    label: 'Matrix regression',
    questions: [

        parts: [
          'Given x₁=[1,1], x₂=[2], x₃=[2] with y=[2,3,1] and using β = (XᵀX)⁻¹Xᵀy with an intercept column, ',

          { blank: true, ans: '5', w: 40 },

          { blank: true, ans: '5', w: 40 },
          '.'
        ]
      }

    bubble: {
      text: '✓ X = [[1,1,1],[1, 2],[1, 2]]. XᵀX: (1,1)=1²+1²+1²=3, (2,2)=1²+2²+0²=5, (3,3)=1²+0²+2²=5. This is the start of computing the closed-form solution β=(XᵀX)⁻¹Xᵀy as shown on slide 42-43.',

        question: 'In gradient descent, what determines the direction of each weight update?',

          'The negative gradient of the loss function with respect to the weights',

          'The second derivative (Hessian) of the loss'
        ],
        ans: 1
      }

    bubble: {
      text: '✓ Gradient descent moves in the direction of the NEGATIVE gradient (steepest descent). The update rule is: w ← w − η·∇L(w), where η is the learning rate and ∇L(w) is the gradient of the loss. Moving opposite to the gradient reduces the loss. The learning rate controls the step size.',

      x: 4, y: 38, w: 92
    }

    maxTries: 2,

          '\\nFor initial point C:  ',
          { blank: true, ans: 'D', w: 50, type: 'select', options: ['A', 'B', 'C', 'D', 'E', 'F'] },
          ' ,  the optimum type:  ',
          { blank: true, ans: 'global minimum', w: 190, type: 'select', options: ['local minimum', 'global minimum', 'local maximum', 'global maximum'] },
          '\\nFor initial point E:  ',
          { blank: true, ans: 'D', w: 50, type: 'select', options: ['A', 'B', 'C', 'D', 'E', 'F'] },
          '\\nFor initial point F:  ',
          { blank: true, ans: 'F', w: 50, type: 'select', options: ['A', 'B', 'C', 'D', 'E', 'F'] },
        ]
      },
  ],
    bubble: {
      text:  '✓ B,D, and F are minimums of the function. D is the global minimum while the rest of points are local minimums. They start from intial points and go down the minus of the gradient, and converge where the gradient is 0 or close to it. If they start near a minimum, e.g. F, they converge to it.',
      x: 4, y: 60, w: 52,
              style: 'bubble', tailSize: 20, tail: 'top',
      bg: 'rgba(15,23,42,0.96)', color: '#fde68a', borderColor: '#f59e0b',
      borderRadius: 8, fontSize: 13
    }
  },
  {
    maxTries: 2,
    label: 'Linear models True/False questions',
    questions: [
      {
            type: 'cloze', x: 4, y: 8, w: 94,
            parts: [
              '1) Linear regression and linear classification can be described using a hyperplane equation (or a multidimensional line):  ',
              { blank: true, ans: 'True', w: 80, type: 'select', options: ['True', 'False'] },
              '.\\n2) A hyperplane equation is defined as the product of parameters and their corresponding input features:  ',
              { blank: true, ans: 'False', w: 80, type: 'select', options: ['True', 'False'] },
              '.\\n3) In linear regression, parameters are derived from an objective function that we aim to minimize, and these parameters are reached through iterative processes:  ',
              { blank: true, ans: 'False', w: 80, type: 'select', options: ['True', 'False'] },
              '.\\n4) Although Logistic Regression is technically a regression method, its output is utilized for linear classification:  ',
              { blank: true, ans: 'True', w: 80, type: 'select', options: ['True', 'False'] },
              '.\\n5) If two variables are dependent on one another, they are necessarily linearly dependent:  ',
              { blank: true, ans: 'False', w: 88, type: 'select', options: ['True', 'False'] },
              '.\\n6) Stopping condition for iterations in linear classification: subset/some of the data points is/are correctly classified:  ',
              { blank: true, ans: 'False', w: 80, type: 'select', options: ['True', 'False'] },
            ]
       },
    ],
    bubble: {
      text: '✓ 1) True by definition. 2) False. The equation also includes a free parameter, or bias, which allows the hyperplane to represent surfaces that do not necessarily pass through the origin. 3) False. Parameters can be derived directly from the objective function without iterations: by differentiating the function, setting the derivative to zero and solving this, thus obtaining an exact analytical solution for the parameters as a function of the given training data. 4) True by definition. 5) False. Two variables can be dependent through any type of relationship, such as parabolic or polynomial one, and are not restricted to linear dependency only. 6) False. To complete the training process, all data points must be correctly classified. If even a single point is misclassified, the algorithm must continue iterating.',
