/* ──────────────────────────────────────────────────────────────────
   EXERCISE 2  —  Toothache / Cavity / Catch  (appears at 1:00)
   ──────────────────────────────────────────────────────────────────
   Joint distribution (from Figure 13.3):
                   toothache               ¬toothache
                catch   ¬catch         catch    ¬catch
   cavity       0.108   0.012         0.072    0.008
   ¬cavity      0.016   0.064         0.144    0.576

   Computed answers:
   • P(cavity)             = 0.108+0.012+0.072+0.008 = 0.2
   • P(toothache)          = 0.108+0.012+0.016+0.064 = 0.2
   • P(cavity ∧ toothache) = 0.108+0.012              = 0.12
   • P(cavity ∨ toothache) = 0.2+0.2−0.12             = 0.28
   • P(¬cavity ∧ toothache)= 0.016+0.064              = 0.08
   • P(¬cavity | toothache)= 0.08 / 0.2               = 0.4
   • P(toothache ∨ catch)  = 1−P(¬tooth ∧ ¬catch)
                           = 1−(0.008+0.576)           = 0.416
   • P(cavity ∧ (tooth∨catch)) = 0.108+0.012+0.072    = 0.192
   • P(cavity | tooth∨catch)   = 0.192 / 0.416         ≈ 0.4615
   ────────────────────────────────────────────────────────────────── */

/* ──────────────────────────────────────────────────────────────────
   EXERCISE 1  —  Bivariate distribution of X and Y  (appears at 1:20)

     p(x1) = 0.16,  p(x2) = 0.17,  p(x3) = 0.11,
     p(x4) = 0.22,  p(x5) = 0.34

   Marginal p(y):
     p(y1) = 0.26,  p(y2) = 0.47,  p(y3) = 0.27

   Conditional p(x | Y=y1):  each p(xi,y1)/p(y1)
     1/26, 2/26, 3/26, 10/26, 10/26
     ≈ 0.0385, 0.0769, 0.1154, 0.3846, 0.3846

   Conditional p(y | X=x3):  each p(x3,yj)/p(x3)
     3/11, 5/11, 3/11
     ≈ 0.2727, 0.4545, 0.2727
   ────────────────────────────────────────────────────────────────── */

var GROUPS = [

  /* ════════════════════════════════════════════════════════════════

        //opacity: 0.05,

<!-- Load the engine AFTER config is defined and KaTeX has loaded -->
<script>
  /* Wait for KaTeX to be ready, then load the engine */
  function loadEngine() {
    var s = document.createElement('script');
    s.src = 'youtube-quiz-engine.js';
    document.body.appendChild(s);
  }
  if (document.readyState === 'complete') {
    setTimeout(loadEngine, 100);
  } else {
    window.addEventListener('load', function () { setTimeout(loadEngine, 100); });
  }
</script>
