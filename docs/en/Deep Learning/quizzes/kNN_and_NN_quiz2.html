<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>

  <!-- KaTeX for LaTeX rendering -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css">
  <script defer
          src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.js"></script>

  <!-- Quiz engine stylesheet -->
  <link rel="stylesheet" href="youtube-quiz-engine.css" />
</head>
<body>

  <div id="header">Machine Learning — k-NN & Neural Networks Quiz</div>

  <div id="quiz-frame">
  <div id="video-wrap">
    <iframe id="yt-player" allow="autoplay"></iframe>
    <div id="overlay-layer"></div>
    <div id="pause-notice">PAUSED &mdash; answer the question</div>
  </div>
</div>

<div id="footer">Click ▶ to start · Tab between fields · Enter to submit</div>

<script>
/* ───────────────────────────────────────────────────────────────
   Quiz configuration — based on "Lec3: k-NN & Neural Networks"
   ─────────────────────────────────────────────────────────────── */

var VIDEO_ID = '';
var BACKGROUND = {
  enabled : true,
  color   : 'linear-gradient(135deg, #1a2a4a 0%, #2c3e7a 50%, #1a2a4a 100%)',
  autoPlay: false
};

var DEFAULT_TIME_GAP   = 4;
var POST_QUIZ_DURATION = 12;

var MOODLE = { enabled: false };

/* ───────────────────────────────────────────────────────────────
   Helpers
   ─────────────────────────────────────────────────────────────── */
var BUBBLE_DEFAULTS = {
  style       : 'bubble',
  tail        : 'left',
  bg          : 'rgba(255,248,200,0.97)',
  borderColor : '#d4a017',
  color       : '#3a2e00',
  fs          : 11,
  padding     : 8,
  borderRadius: 10
};

/* Build a bubble placed on the right side at a given y-level.
   Default tail-left so the pointer indicates the related question on the left. */
function mkBubble(text, y, opts) {
  var b = { x: 70, y: y, w: 28, text: text };
  for (var k in BUBBLE_DEFAULTS) b[k] = BUBBLE_DEFAULTS[k];
  if (opts) for (var k2 in opts) b[k2] = opts[k2];
  return b;
}

/* Text-label helper (white on dark canvas).
   `text` may include HTML and inline / display LaTeX. */
function lbl(x, y, w, text, fs) {
  return {
    type: 'label', x: x, y: y,
    fs: fs || 12, color: '#fff', opacity: 0,
    text: text
  };
}

/* ───────────────────────────────────────────────────────────────
   Geometry conventions used throughout
   ─────────────────────────────────────────────────────────────── */
/*  GROUP_TOP        : y of the first question's label (lower than 0)
    ROW_GAP          : vertical distance between successive questions
    LABEL_X / LABEL_W: column for the question text on the left
    WIDGET_X         : column for the interactive widget
    BUBBLE_X         : column for the explanation bubble (right side)        */
var LABEL_X  = 4,
    WIDGET_X = 4,
    BUBBLE_X = 70,
    BUBBLE_W = 28;

/* ───────────────────────────────────────────────────────────────
   GROUPS  (7 groups, each with multiple questions stacked vertically;
   within each row the label sits above its widget, and the bubble
   for that row sits on the right side at the same y-level)
   ─────────────────────────────────────────────────────────────── */
var GROUPS = [

  /* ════════════════════════════════════════════════════════════
     GROUP 1 — Original Q1, Q2, Q3   (k-NN basics)
     ════════════════════════════════════════════════════════════ */
  {
    label: 'k-NN Basics', maxTries: 3,
    questions: [

      /* ── Row 1 (original Q1) ── */
      { type: 'radio', x: WIDGET_X + 2, y: 10, w: 60, fs: 12,
        question: '<b>Q1.</b> What kinds of tasks can the k-NN algorithm be used for?',
        choices: [
          'Only classification tasks',
          'Only regression tasks',
          'Both classification and regression tasks',
          'Only clustering tasks'
        ],
        ans: 2 },

      /* ── Row 2 (original Q2) ── */
      { type: 'radio', x: WIDGET_X + 2, y: 40, w: 60, fs: 12,
        question: '<b>Q2.</b> In k-NN classification, how is the label of a new point chosen?',
        choices: [
          'By computing the centroid of all training points',
          'By picking the label of the majority of the k nearest neighbours',
          'By solving a system of linear equations',
          'By minimising a cross-entropy loss'
        ],
        ans: 1 },

      /* ── Row 3 (original Q3, FIXED cloze) ── */
      { type: 'cloze', x: WIDGET_X + 2, y: 70, w: 60, fs: 14, lineSpacing: 1.6,
        parts: [
          '<b>Q3.</b> Complete the Euclidean-distance formula used in k-NN \\n(pick what goes in each blank):\\n',
          '\\,$d(A,B) = \\sqrt{(\\,$',
          { blank: true, ans: '$x_A$', w: 70, fs: 13, type: 'select',
            options: ['$x_A$', '$x_B$', '$y_A$', '$y_B$'] },
          '$\\, - x_B)^2 + (y_A - \\,$',
          { blank: true, ans: '$y_B$', w: 70, fs: 13, type: 'select',
            options: ['$x_A$', '$x_B$', '$y_A$', '$y_B$'] },
          '$\\,)^2}$'
        ] }
    ],
    bubbles: [
      mkBubble(
        '<b>Q1 — Both classification and regression.</b><br>' +
        'k-NN is a non-parametric method usable for either task: ' +
        'classification by majority vote, regression by (weighted) average of neighbours.',
        10),
      mkBubble(
        '<b>Q2 — Majority vote of the k nearest neighbours.</b><br>' +
        'No model is fitted; the prediction is made directly from training points at query time.',
        36),
      mkBubble(
        '<b>Q3 — Answer:</b> blanks are <b>x_A</b> and <b>y_B</b>, giving ' +
        '$d=\\sqrt{(x_A-x_B)^2+(y_A-y_B)^2}$. ' +
        'This is the straight-line distance — the most common metric for k-NN.',
        64)
    ]
  },

  /* ════════════════════════════════════════════════════════════
     GROUP 2 — Original Q5, Q6, Q7  (Q4 removed)
     ════════════════════════════════════════════════════════════ */
  {
    label: 'k-NN Example (k=3 on the point (3,2))', maxTries: 3,
    questions: [

      /* ── Row 1 (Q5: 3-NN selection) ── */
      { type: 'checkbox', x: WIDGET_X - 2, y: 10, w: 60, fs: 12,
        question: '<b>Q1.</b> For the query point $(3,2)$ with $k=3$, which training points are the 3 nearest neighbours? (select all)',
        choices: [
          '$(1,1)$ — Red',
          '$(2,1)$ — Red',
          '$(4,3)$ — Blue',
          '$(6,2)$ — Blue'
        ],
        ans: [0, 1, 2] },

      /* ── Row 2 (Q6: majority vote) ── */
      { type: 'radio', x: WIDGET_X - 2, y: 43, w: 60, fs: 12,
        question: '<b>Q2.</b> Using the 3 nearest neighbours $\\{(1,1)\\,R,\\;(2,1)\\,R,\\;(4,3)\\,B\\}$, \\nwhat is the predicted class of $(3,2)$?',
        choices: [ 'Red', 'Blue', 'Cannot be determined — there is a tie', 'Green' ],
        ans: 0 },

      /* ── Row 3 (Q7: regression slider) ── */
      { type: 'slider', x: WIDGET_X - 2, y: 73, w: 60,
        question: '<b>Q3.</b> In a regression variant, the same 3 neighbours carry values 12, 9, 6. Using inverse-distance weights, the predicted value is approximately…',
        min: 6, max: 14, step: 0.1, ans: 8.6, tol: 0.2, unit: '', fs: 12 }
    ],
    bubbles: [
      mkBubble(
        '<b>Q1 — (1,1), (2,1), (4,3).</b><br>' +
        'Distances to $(3,2)$: $(1,1)\\!\\to\\!2.236$, $(2,1)\\!\\to\\!1.414$, ' +
        '$(4,3)\\!\\to\\!1.414$, $(6,2)\\!\\to\\!3.0$. The 3 smallest exclude $(6,2)$.',
        9),
      mkBubble(
        '<b>Q2 — Red.</b><br>' +
        'Red gets 2 votes, Blue gets 1. Majority wins, so the predicted label is Red.',
        40),
      mkBubble(
        '<b>Q3 — $\\approx 8.576$.</b><br>' +
        'Weights $d_i=1/\\text{dist}_i$: $0.447,\\,0.707,\\,0.707$; sum $=1.862$. ' +
        '$\\hat h = (0.447\\!\\cdot\\!12+0.707\\!\\cdot\\!9+0.707\\!\\cdot\\!6)/1.862 \\approx 8.576$.',
        69)
    ]
  },

  /* ════════════════════════════════════════════════════════════
     GROUP 3 — Original Q8, Q9, Q10
     ════════════════════════════════════════════════════════════ */
  {
    label: 'k-NN Properties', maxTries: 3,
    questions: [

      /* ── Row 1 (Q8: algorithm steps ordering) ── */
      { type: 'ordering', x: WIDGET_X + 2, y: 5, w: 60, fs: 11,
        question: '<b>Q1.</b> Drag the steps of the k-NN classification algorithm into the correct order:',
        items: [
          'Compute distance from the query point to every training point',
          'Select the k training points with the smallest distances',
          'Take the majority vote of the labels of those k points',
          'Output the predicted label for the query point'
        ],
        ans: [0, 1, 2, 3] },

      /* ── Row 2 (Q9: effect of k) ── */
      { type: 'radio', x: WIDGET_X + 2, y: 40, w: 60, fs: 12,
        question: '<b>Q2.</b> What typically happens to the decision boundary as $k$ increases?',
        choices: [
          'It becomes more jagged and overfits more',
          'It becomes smoother; with very large $k$ it under-fits',
          'It stays exactly the same',
          'It always improves test accuracy'
        ],
        ans: 1 },

      /* ── Row 3 (Q10: pros & cons match) ── */
      { type: 'match', x: WIDGET_X + 2, y: 65, w: 520,
        fs: 11, dotSize: 12, dotGap: 6, colGap: 40,
        question: '<b>Q3.</b> Match each k-NN property with the correct category:',
        left: [
          'No training phase',
          'Slow at prediction time',
          'Curse of dimensionality',
          'Highly intuitive',
          'Sensitive to feature scale'
        ],
        right: [ '<b>Advantage (Pro)</b>', '<b>Disadvantage (Con)</b>' ],
        ans: [0, 1, 1, 0, 1] }
    ],
    bubbles: [
      mkBubble(
        '<b>Q1 — Compute distances → pick k smallest → majority vote → output.</b><br>' +
        'k-NN has no training phase; all work happens at query time (a "lazy learner").',
        10),
      mkBubble(
        '<b>Q2 — Smoother boundary; very large $k$ → under-fitting.</b><br>' +
        'Low $k$ over-fits (noisy). Very large $k$ averages over far-away ' +
        'irrelevant points and under-fits.',
        44),
      mkBubble(
        '<b>Q3 — Pros:</b> no training, intuitive. <b>Cons:</b> slow prediction, ' +
        'curse of dimensionality, scale sensitivity.',
        70)
    ]
  },

  /* ════════════════════════════════════════════════════════════
     GROUP 4 — Original Q11, Q13   (Q12 removed)
     ════════════════════════════════════════════════════════════ */
  {
    label: 'Shallow Neural Networks & Loss', maxTries: 3,
    questions: [

      /* ── Row 1 (Q11: shallow NN equivalence) ── */
      { type: 'radio', x: WIDGET_X + 2, y: 15, w: 60, fs: 12,
        question: '<b>Q1.</b> A shallow neural network with a single output neuron and a <i>sigmoid</i> activation is equivalent to which classical model?',
        choices: [
          'Linear regression',
          'Logistic regression',
          'k-NN classifier',
          'Decision tree'
        ],
        ans: 1 },

      /* ── Row 2 (Q13: loss for regression) ── */
      { type: 'radio', x: WIDGET_X + 2, y: 53, w: 60, fs: 11,
        question: '<b>Q2.</b> Which loss is typically used for a <i>regression</i> NN?',
        choices: [
          'Binary cross-entropy: $-\\big(y\\log\\hat y + (1-y)\\log(1-\\hat y)\\big)$',
          'Mean Squared Error: $\\|\\hat y - y\\|^2$',
          'Hinge loss: $\\max(0,\\,1-y\\hat y)$',
          'Negative log-likelihood with softmax'
        ],
        ans: 1 }
    ],
    bubbles: [
      mkBubble(
        '<b>Q1 — Logistic regression.</b><br>' +
        'A shallow NN computes $\\hat y = \\sigma(\\omega^\\top x)$. Without $\\sigma$ it is ' +
        'linear regression; with $\\sigma$ it is logistic regression.',
        14),
      mkBubble(
        '<b>Q2 — Mean Squared Error.</b><br>' +
        'For regression we use $\\|\\hat y - y\\|^2$ (or $\\tfrac{1}{n}\\sum(\\hat y_i-y_i)^2$). ' +
        'Cross-entropy is the classification analogue.',
        52)
    ]
  },

  /* ════════════════════════════════════════════════════════════
     GROUP 5 — Original Q14, Q15, Q16
     ════════════════════════════════════════════════════════════ */
  {
    label: 'Gradient Descent & Back-propagation', maxTries: 3,
    questions: [

      /* ── Row 1 (Q14: weight update — FIXED cloze) ── */
      {
        type: 'label', x: WIDGET_X + 2, y: 16, w: 66, fs: 15,
        text: '<b>Q1.</b> Complete the weight-update rule used in gradient descent (pick the symbol for each blank):',
      },
      { type: 'cloze', x: WIDGET_X + 2, y: 21, w: 66, fs: 15, lineSpacing: 1.6, color: '#e2e8f0',
        template: '$\\omega \\leftarrow \\omega - {0}\\cdot \\dfrac{\\partial{1} \\omega}$',
        parts: [
          { blank: true, ans: '$\\eta$', w: 70, fs: 13, type: 'select', options: ['$\\eta$', '$\\omega$', '$L$', '$y_hat$'] },
          { blank: true, ans: '$L$', w: 70, fs: 13, type: 'select', options: ['$\\eta$', '$\\omega$', '$L$', '$y_hat$'] },
        ]

      },
      /* ── Row 2 (Q15: what is η) ── */
      { type: 'radio', x: WIDGET_X + 2, y: 26, w: 60, fs: 12,
        question: '<b>Q2.</b> In the equation above, what does $\\eta$ represent?',
        choices: [
          'The loss value',
          'The activation of the neuron',
          'The learning rate (step size)',
          'The number of training samples'
        ],
        ans: 2 },

      /* ── Row 3 (Q16: backprop ordering) ── */
      { type: 'ordering', x: WIDGET_X + 2, y: 54, w: 60, fs: 11,
        question: '<b>Q3.</b> Drag the four steps inside one back-propagation iteration into the correct order:',
        items: [
          'Forward pass: compute all intermediate neurons & the prediction',
          'Compute the loss between prediction and true output',
          'Backward pass: compute the gradients w.r.t. every weight',
          'Update step: the equation above'
        ],
        ans: [0, 1, 2, 3] }
    ],
    bubbles: [
      mkBubble(
        '<b>Q1 — Answer:</b> $\\omega \\leftarrow \\omega - \\eta\\,\\dfrac{\\partial L}{\\partial \\omega}$. ' +
        '$\\eta$ is the learning rate and $\\partial L/\\partial\\omega$ is the gradient of the loss.',
        10),
      mkBubble(
        '<b>Q2 — The learning rate.</b><br>' +
        'Too large → divergence; too small → slow training. One of the most important hyper-parameters.',
        38),
      mkBubble(
        '<b>Q3 — Forward → Loss → Backward → Update.</b><br>' +
        'This four-step cycle is repeated for every mini-batch; one full pass over the dataset is an <i>epoch</i>.',
        68)
    ]
  },

  /* ════════════════════════════════════════════════════════════
     GROUP 6 — Original Q19, Q20
     ════════════════════════════════════════════════════════════ */
  {
    label: 'Over-fitting in NN Training', maxTries: 3,
    questions: [

      /* ── Row 1 (Q19: over-fitting symptom) ── */
      { type: 'radio', x: WIDGET_X + 2, y: 15, w: 60, fs: 12,
        question: '<b>Q1.</b> Looking at training/validation loss vs. epochs, what is the typical sign of over-fitting?',
        choices: [
          'Both training and validation loss keep decreasing',
          'Training loss keeps decreasing while validation loss starts to <i>increase</i>',
          'Training loss increases sharply',
          'Validation loss is exactly equal to the training loss'
        ],
        ans: 1 },

      /* ── Row 2 (Q20: remedies) ── */
      { type: 'checkbox', x: WIDGET_X + 2, y: 53, w: 60, fs: 12,
        question: '<b>Q2.</b> Select <u>all</u> techniques shown/implied in the lecture for combating under- or over-fitting:',
        choices: [
          'Use a validation split to monitor generalisation',
          'Early stopping at the minimum of the validation curve',
          'Increase the learning rate to infinity',
          'k-fold cross validation to estimate generalisation error',
          'Remove every regularisation mechanism'
        ],
        ans: [0, 1, 3] }
    ],
    bubbles: [
      mkBubble(
        '<b>Q1 — Training loss ↓ but validation loss ↑.</b><br>' +
        'The point where validation loss turns up is when the model starts memorising noise. ' +
        'That is the cue for <b>early stopping</b>.',
        14),
      mkBubble(
        '<b>Q2 — Validation split, early stopping, k-fold CV.</b><br>' +
        'Driving $\\eta\\!\\to\\!\\infty$ or removing all regularisation makes things worse. ' +
        'Standard add-ons: dropout, weight decay, data augmentation.',
        50)
    ]
  },

  /* ════════════════════════════════════════════════════════════
     GROUP 7 — Original Q22, Q24, Q25   (Q23 removed)
     ════════════════════════════════════════════════════════════ */
  {
    label: 'Model Comparison & Wrap-up', maxTries: 3,
    questions: [

      /* ── Row 1 (Q22: match — SVM & Random Forest REMOVED) ── */
      {
        type: 'label', WIDGET_X + 2, y: 15, w: 560, fs: 11,
        text: '<b>Q1.</b> Match each model to its key characteristic from the comparison table:',
      },
      { type: 'match', x: WIDGET_X + 2, y: 17, w: 560, fs: 11, dotSize: 12, dotGap: 8, colGap: 40,
        left: [
          'k-NN',
          'Logistic Regression',
          'Neural Network'
        ],
        right: [
          'Non-parametric, no training phase',
          'Fast & interpretable, assumes linearity',
          'Handles complex non-linear data, not interpretable'
        ],
        ans: [0, 1, 2] },

      /* ── Row 2 (Q24: when to use NN) ── */
      { type: 'checkbox', x: WIDGET_X + 2, y: 35, w: 60, fs: 12,
        question: '<b>Q2.</b> Per the summary slide, which situations favour <u>Neural Networks</u> over k-NN? (select all)',
        choices: [
          'Unstructured, high-dimensional data such as images, audio or text',
          'A very small toy dataset where you want a quick non-parametric baseline',
          'Highly complex, non-linear problems',
          'When interpretability of every decision is the top priority'
        ],
        ans: [0, 2] },

      /* ── Row 3 (Q25: open-ended cloze) ── */
      { type: 'cloze', x: WIDGET_X + 2, y: 63, w: 60, fs: 12, lineSpacing: 1.5,       
        parts: [
          '<b>Q3.</b> In 2–3 sentences, explain the difference between a <i>step</i>, a <i>mini-batch</i> and an <i>epoch</i> during back-propagation:', 
          { blank: true,
            ans: 'A step is one forward+backward+update iteration on a single mini-batch (a subset of the training set). A mini-batch is the chunk of training examples used for one such step. An epoch is one full pass over the entire training dataset, i.e. enough steps to cover every example exactly once.',
            w: 480, h: 70, fs: 12, type: 'open',
            placeholder: 'Write your answer here. It will be evaluated by AI…' }
        ] }
    ],
    bubbles: [
      mkBubble(
        '<b>Q1 — k-NN:</b> non-parametric, no training. ' +
        '<b>Logistic Regression:</b> fast & interpretable, linear. ' +
        '<b>Neural Network:</b> non-linear, black-box.',
        10),
      mkBubble(
        '<b>Q2 — Unstructured/high-dim data and complex non-linear problems.</b><br>' +
        'k-NN is preferred for small/simple tasks; if interpretability matters most, ' +
        'classical models usually win.',
        38),
      mkBubble(
        '<b>Q3 — Reference answer:</b><br>' +
        '• <b>Step:</b> one forward + loss + backward + update, on a single mini-batch.<br>' +
        '• <b>Mini-batch:</b> the small subset of examples used in one step.<br>' +
        '• <b>Epoch:</b> one full pass through the whole dataset.',
        60)
    ]
  }

];
</script>

<!-- Load the engine AFTER config is defined and KaTeX has loaded -->
<script>
  /* Wait for KaTeX to be ready, then load the engine */
  function loadEngine() {
    var s = document.createElement('script');
    s.src = 'youtube-quiz-engine.js';
    document.body.appendChild(s);
  }
  if (document.readyState === 'complete') {
    setTimeout(loadEngine, 100);
  } else {
    window.addEventListener('load', function () { setTimeout(loadEngine, 100); });
  }
</script>

</body>
</html>
