function m(base, extra) { var o={}; for(var k in base) o[k]=base[k]; for(var k in extra) o[k]=extra[k]; return o; }

var GROUPS = [
  {

    }
   ]

      x: 56, y: 15, w: 42

      text: '✓ True: Decision trees work for BOTH classification and regression (slide 96). They use a GREEDY algorithm (not globally optimal). IG = H(parent) − Σ(|child|/|parent|)·H(child). They do NOT require feature scaling since splits are based on thresholds, not distances.',

      x: 56, y: 60, w: 42
    }
   ]

    maxTries: 3,

        ans: 2

   ]

      style: 'bubble', tailSize: 20, tail: 'top',
      x: 4, y: 45, w: 92
    }
  },
  {
      maxTries: 2,
      label: 'Classification True/False Questions',
      questions: [
      {
        type: 'cloze', x: 4, y: 5, w: 94,
        parts: [
          '1) Logistic regression is not used for classification:  ',
          { blank: true, ans: 'False', w: 80, type: 'select', options: ['True', 'False'] },
          '.\\n2) Logistic regression is an example of a discriminative approach, whereas Naive Bayes is a generative method:  ',
          { blank: true, ans: 'True', w: 80, type: 'select', options: ['True', 'False'] },

          { blank: true, ans: 'True', w: 80, type: 'select', options: ['True', 'False'] }
        ]
      }
    ],
    bubble: {
      text: '✓ 1) False. Its output is the probability of belonging to a certain class, therefore it is indeed used for classification. 2) True. In logistic regression, we directly compute y as a function of x, whereas in Naive Bayes, we learn the distribution of the data itself in order to compute y given x. 3) False. A decision tree is a non-parametric model, meaning it has no parameters to learn; rather, it learns a tree structure for classification. 4) True. This is the primary objective when building a decision tree: to increase class purity with each new split. 5) True. This is exactly the method used (e.g., maximizing information gain or decreasing impurity).',
      style: 'bubble', tailSize: 11, tail: 'top',

    }

{
  label: 'Classification - open-ended questions',
