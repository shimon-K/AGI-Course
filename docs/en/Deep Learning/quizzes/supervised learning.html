var GROUPS = [

      x: 4, y: 50, w: 92

      x: 4, y: 38, w: 92

    }
   ]

          'To select the optimal number of layers'

      }

    bubble: {
      text: '✓ Backpropagation computes the gradient of the loss function with respect to each weight by applying the chain rule layer by layer, from output back to input (slide 115). These gradients tell us how much each weight contributed to the error, enabling gradient descent weight updates.',

      x: 4, y: 40, w: 92
    }
  },

          '. A very complex model (e.g., deep NN) typically has low ',
          { blank: true, ans: 'bias', w: 60 },

        ans: 1

    bubble: {
      text: '✓ k-fold cross-validation (slide 120) splits data into k folds, trains on k−1 and tests on 1, rotating k times. The performance is averaged across all k splits, giving a more reliable and less variable estimate than a single split, which can be lucky/unlucky. It does NOT eliminate overfitting — it better detects it.',
      style: 'bubble', tailSize: 20, tail: 'top',
      x: 4, y: 40, w: 92
    }
  },

      text: '✓ RNNs maintain a hidden state sₖ that is updated at each time step: sₖ₊₁ = f(sₖ, xₖ) (slide 123). This hidden state acts as "memory", carrying information from previous inputs to influence the processing of later ones. Variants like LSTM and GRU (slide 125) address the vanishing gradient problem in basic RNNs.',
