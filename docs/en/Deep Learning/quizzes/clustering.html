<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title></title>

  <!-- KaTeX for LaTeX rendering -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css">
  <script defer
          src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.js"></script>

  <!-- Quiz engine styles -->
  <link rel="stylesheet" href="youtube-quiz-engine.css">
</head>
<body>

<div id="header">📘 Machine Learning Course — Clustering Quiz</div>

<div id="quiz-frame">
  <div id="video-wrap">
    <iframe id="yt-player" allow="autoplay"></iframe>
    <div id="overlay-layer"></div>
    <div id="pause-notice">PAUSED &mdash; answer the question</div>
  </div>
</div>

<div id="footer">Click ▶ to start · Tab between fields · Enter to submit</div>

<script>
var BACKGROUND = {
  enabled:  true,
  color:    '#ffffff',
  //duration: 120,
  autoPlay: false
};
/* Default gap between auto-timed groups (seconds).
   First group defaults to time=5, subsequent groups = prev + gap. */
var DEFAULT_TIME_GAP = 12;
var POST_QUIZ_DURATION = 15; // Number of seconds after the last question to trigger the summary

function m(base, extra) { var o={}; for(var k in base) o[k]=base[k]; for(var k in extra) o[k]=extra[k]; return o; }

var GROUPS = [
  {
    maxTries: 3,
    label: 'Clustering',
    questions: [
      {
        type: 'radio', x: 4, y: 8, w: 92,
        question: 'Clustering is an example of which type of machine learning?',
        choices: [
          'Supervised learning',
          'Unsupervised learning',
          'Reinforcement learning',
          'Semi-supervised learning'
        ],
        ans: 1
      }
    ],
    bubble: {
      text: '✓ Clustering is unsupervised learning — the data has NO labels. The algorithm discovers natural groupings based on similarity/distance between data points. Unlike supervised learning, there are no "correct answers" to learn from (slide 138).',
      style: 'bubble', tailSize: 20, tail: 'top',
      x: 4, y: 45, w: 92
    }
  },
  {
    maxTries: 3,
    label: 'k-Means',
    questions: [
      {
        type: 'cloze', x: 4, y: 8, w: 30,
        parts: [
          'k-Means is guaranteed to converge to the global optimum:  ',
          { blank: true, ans: 'False', w: 77,
            type: 'select',
            options: ['True', 'False'] }
        ]
      },

      {
        type: 'ordering', x: 4, y: 25, w: 35,
        question: 'Order the k-Means algorithm steps:',
        items: [
          'Assign each point to the nearest centroid',
          'Check for convergence (assignments unchanged)',
          'Initialize k centroids',
          'Recompute centroids as means of assigned points'
        ],
        ans: [2, 0, 3, 1]
      },
      {
        type: 'radio', x: 4, y: 63, w: 50,
        question: 'Which cluster shape is k-Means UNABLE to discover correctly?',
        choices: [
          'Spherical (round) clusters',
          'Equally-sized clusters',
          'Non-convex or ring-shaped clusters',
          'Clusters with the same density'
        ],
        ans: 2
      }
    ],
    bubbles: [ {
      text: '✓ False! k-Means is guaranteed to converge (the objective decreases monotonically), but only to a LOCAL optimum — not necessarily the global one. The result depends on the initial centroid placement (slide 157). That\'s why it\'s common to run k-Means multiple times with different random initializations.',
      style: 'bubble', tailSize: 20, tail: 'left',
      x: 38, y: 8, w: 60
    },
    {
      text: '✓ k-Means: (1) Initialize k centroids (randomly or by chosen points). (2) Assign each data point to its nearest centroid (E-step). (3) Recompute centroids as the mean of assigned points (M-step). (4) Check convergence — repeat steps 2-3 until assignments no longer change (slides 140-156).',
      style: 'bubble', tailSize: 20, tail: 'left',
      x: 41, y: 35, w: 57
    },
    {
      text: '✓ k-Means uses distance to centroids, so it naturally forms convex (roughly spherical) clusters. It CANNOT correctly identify non-convex shapes like rings, crescents, or interleaving spirals (slide 157). For such shapes, density-based methods like DBSCAN or spectral clustering are needed.',
      style: 'bubble', tailSize: 20, tail: 'left',
      x: 46, y: 62, w: 52
    }
   ]
  },
  {
    maxTries: 3,
    label: 'Hard vs Soft clustering',
    questions: [
      {
        type: 'radio', x: 4, y: 8, w: 92,
        question: 'Which clustering method assigns each point a PROBABILITY of belonging to each cluster (soft clustering)?',
        choices: [
          'k-Means',
          'DBSCAN',
          'Gaussian Mixture Model (GMM)',
          'Hierarchical clustering'
        ],
        ans: 2
      }
    ],
    bubble: {
      text: '✓ GMM performs soft clustering — each point has a responsibility rₙₖ ∈ (0,1) representing the probability it belongs to cluster k (slide 164). k-Means does hard clustering (each point belongs to exactly one cluster). DBSCAN and hierarchical clustering also produce hard assignments.',
              style: 'bubble', tailSize: 20, tail: 'top',
      x: 4, y: 45, w: 92
    }
  },
  {
    maxTries: 3,
    label: 'k-Means centroid update',
    questions: [
      {
        type: 'cloze', x: 4, y: 10, w: 92,
        parts: [
          'Points assigned to cluster C1: A=(0,4), B=(1,2), C=(3,2), F=(4,4). ',
          'New centroid = mean of coordinates: x̄ = ',
          { blank: true, ans: '2', w: 40 },
          ', ȳ = ',
          { blank: true, ans: '3', w: 40 },
          '. New C1 = (',
          { blank: true, ans: '2', w: 30 },
          ', ',
          { blank: true, ans: '3', w: 30 },
          ').'
        ]
      }
    ],
    bubble: {
      text: '✓ The new centroid is simply the arithmetic mean of all points assigned to the cluster. x̄ = (0+1+3+4)/4 = 8/4 = 2. ȳ = (4+2+2+4)/4 = 12/4 = 3. So C1 = (2,3). This is the M-step of k-Means (slides 148, 151, 154).',
              style: 'bubble', tailSize: 20, tail: 'top',
      x: 4, y: 35, w: 92
    }
  },
  {
    maxTries: 3,
    label: 'Match clustering methods',
    questions: [
      {
        type: 'match', x: 4, y: 8, w: 380, fs: 13,
        dotSize: 16, dotGap: 14, colGap: 120,
        left:  ['k-Means', 'DBSCAN', 'Hierarchical', 'GMM'],
        right: ['Produces a dendrogram', 'Density-based; handles noise', 'Uses Gaussian probabilities', 'Minimizes within-cluster variance'],
        ans:   [3,1,0,2]
      }
    ],
    bubble: {
      text: '✓ k-Means → Minimizes within-cluster variance (sum of squared distances to centroids). DBSCAN → Density-based, identifies noise points. Hierarchical → Builds a tree (dendrogram) by merging/splitting. GMM → Models clusters as Gaussian distributions with probabilities.',
              style: 'bubble', tailSize: 20, tail: 'top',
      x: 4, y: 52, w: 92
    }
  },
  {
    maxTries: 3,
    label: 'DBSCAN',
    questions: [
      {
        type: 'checkbox', x: 4, y: 8, w: 42,
        question: 'Select ALL parameters required by DBSCAN:',
        choices: [
          'k — number of clusters',
          'ε (eps) — maximum distance between neighbors',
          'MinPts — minimum points to form a core point',
          'σ — variance of Gaussian distribution',
          'Linkage type (single, complete, average)'
        ],
        ans: [1, 2]
      },
      {
        type: 'radio', x: 4, y: 48, w: 42,
        question: 'In DBSCAN, a point with fewer than MinPts neighbors within ε, but which is within ε of a core point, is called a:',
        choices: [
          'Core point',
          'Border point',
          'Noise point',
          'Centroid'
        ],
        ans: 1
      }
    ],
    bubbles: [ {
      text: '✓ DBSCAN requires only two parameters (slide 183): ε (epsilon) — the maximum distance for two points to be neighbors, and MinPts — the minimum number of neighbors within ε for a point to be a "core point." Unlike k-Means, DBSCAN does NOT need k (number of clusters) — it discovers clusters automatically!',
      style: 'bubble', tailSize: 20, tail: 'left',
      x: 50, y: 12, w: 47
    },
    {
      text: '✓ Border point — it doesn\'t have enough neighbors to be a core point itself, but it\'s close enough to a core point to belong to its cluster (slide 184). Core points have ≥ MinPts neighbors. Noise points are not close to any core point and don\'t belong to any cluster.',
      style: 'bubble', tailSize: 20, tail: 'left',
      x: 50, y: 53, w: 47
    }
   ]
  },
  {
    maxTries: 3,
    label: 'GMM',
    questions: [
      {
        type: 'radio', x: 4, y: 8, w: 44,
        question: 'What are the parameters of a Gaussian Mixture Model (GMM)?',
        choices: [
          'Only the means (μₖ) for each cluster',
          'Means (μₖ), covariances (Σₖ), and mixing coefficients (πₖ)',
          'Only the centroids and cluster assignments',
          'ε and MinPts'
        ],
        ans: 1
      },
      {
        type: 'cloze', x: 4, y: 45, w: 92,
        parts: [
          'GMM with 2 clusters. For point x=1: π₁·N(1|μ₁=1,σ=1)=0.5×0.3989=0.1995, π₂·N(1|μ₂=5,σ=1)=0.5×0.0001=0.00005. ',
          'Responsibility r₁ ≈ ',
          { blank: true, ans: '0.9997', w: 65, tol:0.01 },
          '. So point x=1 is almost entirely assigned to cluster ',
          { blank: true, ans: '1', w: 30 },
          '.'
        ]
      }
    ],
    bubbles: [ {
      text: '✓ GMM parameters (slides 162-164): For each of K clusters: μₖ (mean/center), Σₖ (covariance matrix describing shape/spread), and πₖ (mixing coefficient — prior probability of cluster k, where Σπₖ=1). These are learned iteratively using the EM algorithm.',
      style: 'bubble', tailSize: 20, tail: 'left',
      x: 54, y: 11, w: 42
    },
    {
      text: '✓ The E-step computes responsibilities: r₁ = π₁·N(x|μ₁,σ₁) / [π₁·N(x|μ₁,σ₁) + π₂·N(x|μ₂,σ₂)] = 0.1995/0.2 ≈ 0.9997. Point x=1 is virtually 100% assigned to cluster 1 (μ₁=1), which makes intuitive sense since x=1 is far from μ₂=5. This is the E-step from slide 174.',
      style: 'bubble', tailSize: 20, tail: 'top',
      x: 4, y: 67, w: 92
    }
   ]
  },
  {
    maxTries: 3,
    label: 'Hierarchical clustering',
    questions: [
      {
        type: 'ordering', x: 4, y: 8, w: 42,
        question: 'Order the steps of bottom-up (agglomerative) hierarchical clustering:',
        items: [
          'Merge the two closest clusters',
          'Repeat until one cluster remains',
          'Start with each point as its own cluster',
          'Calculate distance between all cluster pairs'
        ],
        ans: [2, 3, 0, 1]
      },
      {
        type: 'radio', x: 4, y: 58, w: 42,
        question: 'What is a dendrogram in the context of hierarchical clustering?',
        choices: [
          'A scatter plot of cluster centroids',
          'A tree diagram showing the sequence of cluster merges and their distances',
          'A bar chart of cluster sizes',
          'A confusion matrix for cluster assignments'
        ],
        ans: 1
      }
    ],
    bubbles: [ {
      text: '✓ Bottom-up hierarchical clustering (slide 180): (1) Start with each point as its own cluster. (2) Calculate distances between every pair of clusters. (3) Merge the two closest clusters. (4) Repeat steps 2-3 until only one cluster remains. The result is visualized as a dendrogram.',
      style: 'bubble', tailSize: 20, tail: 'left',
      x: 50, y: 18, w: 42
    },
    {
      text: '✓ A dendrogram (slide 178) is a tree diagram that shows the hierarchical merging sequence. The y-axis represents the distance/dissimilarity at which clusters were merged. By cutting the dendrogram at a chosen height, you can obtain any desired number of clusters — from coarse (few clusters) to granular (many clusters).',
      style: 'bubble', tailSize: 20, tail: 'left',
      x: 50, y: 58, w: 48
    }
   ]
  },
  {
    maxTries: 3,
    label: 'DBSCAN vs k-Means',
    questions: [
      {
        type: 'radio', x: 4, y: 8, w: 92,
        question: 'Which advantage does DBSCAN have over k-Means?',
        choices: [
          'DBSCAN always runs faster',
          'DBSCAN can find clusters of arbitrary shape and identify noise points',
          'DBSCAN guarantees finding the global optimum',
          'DBSCAN requires fewer parameters'
        ],
        ans: 1
      }
    ],
    bubble: {
      text: '✓ DBSCAN\'s key advantages over k-Means (slide 187): (1) Can discover clusters of arbitrary shape (not just spherical). (2) Identifies noise/outlier points. (3) Does not require specifying k (number of clusters). Limitations: struggles with varying densities and high-dimensional data (slide 188).',
      style: 'bubble', tailSize: 20, tail: 'top',
      x: 4, y: 45, w: 92
    }
  },
  {
    maxTries: 3,
    label: 'Clustering True/False questions',
    questions: [
      {
        type: 'cloze', x: 4, y: 5, w: 94,
        parts: [
          '1) The parameter k in the k-Nearest Neighbors and k-Means methods serves the identical role:  ',
          { blank: true, ans: 'False', w: 80, type: 'select', options: ['True', 'False'] },
          '.\\n2) In the Gaussian Mixture Model (GMM) method, each data point belongs to a single, distinct cluster:  ',
          { blank: true, ans: 'False', w: 80, type: 'select', options: ['True', 'False'] },
          '.\\n3) Both GMM and k-Means involve two steps in each iteration: first, fixing the parameters to determine the assignment of points to clusters, and second, fixing the assignments to update the parameters:  ',
          { blank: true, ans: 'True', w: 80, type: 'select', options: ['True', 'False'] }
        ]
      }
    ],
    bubble: {
      text: '✓ 1) False. These are two distinct methods where k plays different roles: in k-NN, it represents the number of neighbors used for prediction, whereas in k-Means, it represents the number of clusters to partition the data into. 2) False. GMM is a soft-clustering method, meaning a single data point belongs to all clusters with varying degrees. 3) True. Both use this alternating optimization approach (the Expectation-Maximization algorithm in GMM, and the assignment/update steps in k-Means).',
      style: 'bubble', tailSize: 11, tail: 'top',
      x: 2, y: 64, w: 96
    }
  }

];
</script>

<!-- Load the engine AFTER config is defined and KaTeX has loaded -->
<script>
  /* Wait for KaTeX to be ready, then load the engine */
  function loadEngine() {
    var s = document.createElement('script');
    s.src = 'youtube-quiz-engine.js';
    document.body.appendChild(s);
  }
  if (document.readyState === 'complete') {
    setTimeout(loadEngine, 100);
  } else {
    window.addEventListener('load', function () { setTimeout(loadEngine, 100); });
  }
</script>


</body>
</html>
