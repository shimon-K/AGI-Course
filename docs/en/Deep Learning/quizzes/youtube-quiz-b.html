  send: function (totalPct, perGroupData) {
    if (!this.enabled || !this.url || !this.token) return;
    var payload = {
      wstoken: this.token, wsfunction: 'mod_assign_save_grade',
      moodlewsrestformat: 'json', assignmentid: this.assignid,
      userid: this.userid, grade: totalPct,
      attemptnumber: -1, addattempt: 1, workflowstate: 'graded'

    var params = Object.keys(payload).map(function(k) {
      return encodeURIComponent(k) + '=' + encodeURIComponent(payload[k]);
    }).join('&');
    fetch(this.url + '/webservice/rest/server.php', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: params
    }).then(function(r) { return r.json(); })
      .then(function(d) { console.log('Moodle response:', d); })
      .catch(function(e) { console.error('Moodle error:', e); });
  }
};
